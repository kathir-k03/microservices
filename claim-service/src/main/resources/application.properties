server.port=8081

spring.application.name=claim-service

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/claim_db
spring.datasource.username=postgres
spring.datasource.password=Bala@2004
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Resilience4j
resilience4j.circuitbreaker.instances.policyService.failureRateThreshold=50
resilience4j.retry.instances.policyRetry.maxAttempts=3

resilience4j.circuitbreaker.instances.documentService.failureRateThreshold=50
resilience4j.retry.instances.documentRetry.maxAttempts=3



spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000